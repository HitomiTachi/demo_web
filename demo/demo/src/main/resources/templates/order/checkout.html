<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/_layout}">
<head>
    <title>Thanh toán</title>
</head>
<body>
<div layout:fragment="content" class="container body-content py-3">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/cart}">Giỏ hàng</a></li>
            <li class="breadcrumb-item active" aria-current="page">Thanh toán</li>
        </ol>
    </nav>

    <h1 class="h3 mb-4">Thanh toán</h1>

    <div class="row g-4">
        <div class="col-lg-5 order-lg-2">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3 border-bottom">
                    <h2 class="h6 mb-0">Đơn hàng (<span th:text="${#lists.size(cartItems)}">0</span> sản phẩm)</h2>
                </div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex gap-3 py-3" th:each="item : ${cartItems}">
                            <img th:if="${item.image}" th:src="@{'/images/' + ${item.image}}"
                                 class="rounded border flex-shrink-0" width="64" height="64" style="object-fit: cover;" alt=""/>
                            <div class="flex-grow-1 min-w-0">
                                <div class="fw-medium" th:text="${item.name}">Tên</div>
                                <div class="small text-muted">
                                    <span th:text="${#numbers.formatInteger(item.price, 0, 'POINT')} + ' ₫'"></span>
                                    × <span th:text="${item.quantity}">1</span>
                                </div>
                            </div>
                            <div class="text-end flex-shrink-0 fw-semibold"
                                 th:text="${#numbers.formatInteger(item.price * item.quantity, 0, 'POINT')} + ' ₫'">0</div>
                        </li>
                    </ul>
                </div>
                <div class="card-footer bg-light d-flex justify-content-between align-items-center py-3">
                    <span class="fw-medium">Tạm tính</span>
                    <span class="fs-5 fw-bold text-success"
                          th:text="${#numbers.formatInteger(total, 0, 'POINT')} + ' ₫'">0</span>
                </div>
            </div>
        </div>

        <div class="col-lg-7 order-lg-1">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3 border-bottom">
                    <h2 class="h6 mb-0">Thông tin giao hàng</h2>
                </div>
                <div class="card-body">
                    <form th:action="@{/checkout}" th:object="${checkoutForm}" method="post" class="needs-validation">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label for="recipientName" class="form-label">Họ và tên người nhận</label>
                            <input type="text" class="form-control" id="recipientName" th:field="*{recipientName}"
                                   placeholder="Nguyễn Văn A" autocomplete="name"/>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('recipientName')}"
                                 th:errors="*{recipientName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">Số điện thoại</label>
                            <input type="tel" class="form-control" id="phone" th:field="*{phone}"
                                   placeholder="0901234567" autocomplete="tel"/>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}"
                                 th:errors="*{phone}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="address" class="form-label">Địa chỉ nhận hàng</label>
                            <textarea class="form-control" id="address" rows="3" th:field="*{address}"
                                      placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành phố"></textarea>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('address')}"
                                 th:errors="*{address}"></div>
                        </div>

                        <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center pt-2 border-top">
                            <a th:href="@{/cart}" class="btn btn-outline-secondary">← Quay lại giỏ hàng</a>
                            <button type="submit" class="btn btn-success btn-lg px-4">Xác nhận đặt hàng</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
