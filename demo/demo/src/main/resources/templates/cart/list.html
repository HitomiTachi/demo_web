<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/_layout}">
<head>
    <title>Giỏ hàng</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h1 class="mb-4">Giỏ hàng của bạn</h1>

    <div th:if="${cartItems == null or cartItems.isEmpty()}" class="alert alert-info">
        Giỏ hàng đang trống. <a th:href="@{/products}" class="alert-link">Xem sản phẩm</a>
    </div>

    <div th:if="${cartItems != null and !cartItems.isEmpty()}">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>Tên sản phẩm</th>
                <th>Hình ảnh</th>
                <th>Giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cartItems}">
                <td th:text="${item.name}"></td>
                <td>
                    <img th:if="${item.image}" th:src="@{'/images/' + ${item.image}}" width="100" alt=""/>
                    <span th:unless="${item.image}" class="text-muted small">—</span>
                </td>
                <td th:text="${item.price}"></td>
                <td>
                    <form th:action="@{/cart/update}" method="post" class="d-inline-flex align-items-center gap-1 flex-wrap">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="productId" th:value="${item.id}"/>
                        <input type="number" name="quantity" class="form-control form-control-sm d-inline-block"
                               style="width: 4.5rem;" th:value="${item.quantity}" min="1"/>
                        <button type="submit" class="btn btn-sm btn-outline-secondary">Cập nhật</button>
                    </form>
                </td>
                <td th:text="${item.price * item.quantity}"></td>
                <td>
                    <a class="link-primary text-decoration-underline" th:href="@{/cart/remove/{id}(id=${item.id})}">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="text-end mt-3">
            <p class="mb-2 fs-5 fw-bold">Total Price: <span th:text="${total}"></span></p>
            <a th:href="@{/checkout}" class="btn btn-success">Order</a>
        </div>
    </div>
</div>
</body>
</html>
