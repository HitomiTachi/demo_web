<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Danh sách Sách</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">📖 Danh sách Sách</h2>
            <a th:href="@{/books/add}" class="btn btn-success" sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-plus-circle"></i> Thêm Sách Mới
            </a>
        </div>

        <!-- Thông báo -->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Form tìm kiếm -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/books}" method="get" class="row g-3">
                    <div class="col-md-10">
                        <input type="text" 
                               class="form-control" 
                               name="search" 
                               th:value="${searchKeyword}"
                               placeholder="Tìm kiếm theo tiêu đề hoặc tác giả...">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">🔍 Tìm kiếm</button>
                    </div>
                </form>
                <div th:if="${searchKeyword}" class="mt-2">
                    <a th:href="@{/books}" class="btn btn-sm btn-outline-secondary">Xóa bộ lọc</a>
                    <span class="ms-2 text-muted">Kết quả tìm kiếm cho: <strong th:text="${searchKeyword}"></strong></span>
                </div>
            </div>
        </div>

        <!-- Bảng danh sách sách -->
        <div class="card">
            <div class="card-body">
                <div th:if="${books == null or books.isEmpty()}" class="text-center py-5">
                    <p class="text-muted">Không có sách nào trong danh sách.</p>
                    <a th:href="@{/books/add}" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">Thêm sách đầu tiên</a>
                </div>

                <div th:if="${books != null and !books.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Tiêu đề</th>
                                    <th>Tác giả</th>
                                    <th class="text-end">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="book : ${books}">
                                    <td th:text="${book.id}"></td>
                                    <td th:text="${book.title}"></td>
                                    <td th:text="${book.author}"></td>
                                    <td class="text-end">
                                        <a th:href="@{/books/edit/{id}(id=${book.id})}" 
                                           class="btn btn-sm btn-warning me-2"
                                           sec:authorize="hasRole('ADMIN')">
                                            ✏️ Sửa
                                        </a>
                                        <a th:href="@{/books/delete/{id}(id=${book.id})}" 
                                           class="btn btn-sm btn-danger"
                                           sec:authorize="hasRole('ADMIN')"
                                           onclick="return confirm('Bạn có chắc chắn muốn xóa sách này?')">
                                            🗑️ Xóa
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="mt-3 text-muted">
                        <small>Tổng số: <strong th:text="${#lists.size(books)}"></strong> cuốn sách</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
