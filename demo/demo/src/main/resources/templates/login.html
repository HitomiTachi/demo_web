<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Đăng nhập</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">Đăng nhập</h2>
                    <div th:if="${param.error}" class="alert alert-danger">Sai tên đăng nhập hoặc mật khẩu.</div>
                    <div th:if="${param.logout}" class="alert alert-success">Bạn đã đăng xuất.</div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label" for="username">Tên đăng nhập</label>
                            <input class="form-control" id="username" name="username" type="text" autocomplete="username" required autofocus/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Mật khẩu</label>
                            <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                    </form>
                    <p class="text-muted small mt-3 mb-0">Tài khoản mẫu (CSDL, seed khi chạy lần đầu): <code>admin</code> / <code>admin</code> · <code>user</code> / <code>user</code></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
